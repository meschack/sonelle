name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            gstreamer1.0-plugins-bad \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            xdg-utils

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy, rustfmt

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build frontend
        run: pnpm build

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Check native shell
        run: cargo check --workspace --locked

      - name: Lint native shell
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test native shell
        run: cargo test --workspace --locked

  bundle-linux:
    name: Build Linux desktop bundle
    runs-on: ubuntu-24.04
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            gstreamer1.0-plugins-bad \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            xdg-utils \
            libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop bundle
        run: pnpm build:desktop

  release-candidate:
    name: Release candidate
    needs: bundle-linux
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    permissions:
      contents: read
    uses: ./.github/workflows/release-candidate.yml
