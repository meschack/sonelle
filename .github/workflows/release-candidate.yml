name: Release Candidate

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  bundle:
    name: Build ${{ matrix.label }} candidate
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - label: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - label: Linux x64
            platform: ubuntu-22.04
            args: ""
          - label: Windows x64
            platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            gstreamer1.0-plugins-bad \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            xdg-utils \
            libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Stage Windows voice runtime libraries
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: ./scripts/stage-windows-voice-runtime.ps1

      - name: Build desktop candidate
        run: pnpm --filter @sonelle/desktop tauri build ${{ matrix.args }}

      - name: Upload candidate bundles
        uses: actions/upload-artifact@v7
        with:
          name: sonelle-candidate-${{ matrix.label }}-${{ github.sha }}
          if-no-files-found: error
          path: target/**/release/bundle/**/*
