name: Release

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

concurrency:
  group: release-${{ github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon
            platform: macos-latest
            args: --target aarch64-apple-darwin
          - label: macOS Intel
            platform: macos-latest
            args: --target x86_64-apple-darwin
          - label: Linux x64
            platform: ubuntu-22.04
            args: ""
          - label: Windows x64
            platform: windows-latest
            args: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Fetch release tags
        run: git fetch --force --tags

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            xdg-utils \
            libfuse2

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare release version
        id: version
        run: node scripts/prepare-release-version.mjs

      - name: Build and upload bundles
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: "-"
        with:
          projectPath: apps/desktop
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: ${{ steps.version.outputs.release_name }}
          releaseBody: |
            Automated Sonelle desktop release from ${{ github.event.workflow_run.head_sha || github.sha }}.

            Assets include platform bundles for Linux, macOS, and Windows.
            macOS builds use ad-hoc signing until a Developer ID certificate is configured.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
